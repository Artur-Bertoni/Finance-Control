spring:
  jpa:
    open-in-view: true
  datasource:
    url: jdbc:postgresql://localhost:5432/finance-control-prd

server:
  port: 8081
  servlet:
    context-path: /api/finance-control
  compression:
    enabled: true
  error:
    include-message: always
  spring:
    url: ${SPRING-URL:localhost:8081}