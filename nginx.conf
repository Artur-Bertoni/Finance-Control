# ─── HTTP: redireciona tudo para HTTPS ────────────────────────────────────────
server {
    listen 80;
    server_name seu-dominio.com;   # SUBSTITUA pelo seu domínio real

    return 301 https://$host$request_uri;
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name seu-dominio.com;   # SUBSTITUA pelo seu domínio real

    # --- Certificados SSL ---
    # Opção 1 – Let's Encrypt (Certbot):
    #   sudo certbot --nginx -d seu-dominio.com
    #   O Certbot preenche automaticamente os caminhos abaixo.
    #
    # Opção 2 – Certificado próprio: aponte para os arquivos .crt / .key.
    ssl_certificate     /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;

    # --- Parâmetros de segurança TLS recomendados ---
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # --- Cabeçalhos de segurança ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    root /usr/share/nginx/html;

    # --- Compressão (reduz drasticamente CSS/JS/JSON/fontes no primeiro load) ---
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/css text/plain text/javascript application/javascript
                      application/json application/xml image/svg+xml font/ttf
                      font/otf application/vnd.ms-fontobject;

    # --- Cache de assets estáticos versionados ---
    # JS/CSS/imagens/fontes mudam pouco; cache longo evita rebaixar a cada visita.
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|otf|eot)$ {
        expires    30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files  $uri =404;
    }

    # HTML nunca em cache (garante que mudanças apareçam de imediato)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files  $uri =404;
    }

    location /api/ {
        proxy_pass         http://api:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /oauth2/ {
        proxy_pass         http://api:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass         http://api:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = / {
        return 302 https://$http_host/pages/Login.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
