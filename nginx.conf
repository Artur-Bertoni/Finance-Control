# ─── HTTP: redireciona tudo para HTTPS ────────────────────────────────────────
server {
    listen 80;
    server_name seu-dominio.com;   # SUBSTITUA pelo seu domínio real

    return 301 https://$host$request_uri;
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name seu-dominio.com;   # SUBSTITUA pelo seu domínio real

    # --- Certificados SSL ---
    # Opção 1 – Let's Encrypt (Certbot):
    #   sudo certbot --nginx -d seu-dominio.com
    #   O Certbot preenche automaticamente os caminhos abaixo.
    #
    # Opção 2 – Certificado próprio: aponte para os arquivos .crt / .key.
    ssl_certificate     /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;

    # --- Parâmetros de segurança TLS recomendados ---
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # --- Cabeçalhos de segurança ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass         http://api:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /oauth2/ {
        proxy_pass         http://api:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass         http://api:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = / {
        return 302 https://$http_host/pages/Login.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
