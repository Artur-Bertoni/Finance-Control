services:
  finance-control-api-prod:
    container_name: finance-application
    image: arturbertoni/finance-control:v1
    build: ./finance-control
    restart: always
    ports:
      - "8081:8080"
    environment:
      - URL_POSTGRES=jdbc:postgresql://postgres:5433/finance-control-prd
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass
      - SPRING_PROFILES_ACTIVE=prd

  postgres-prod:
    container_name: postgres-prd
    image: postgres
    restart: always
    ports:
      - '5433:5433'
    environment:
      - POSTGRES_DB=finance-control-prd
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass

  postgres-dev:
    container_name: postgres-dev
    image: postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=finance-control-dev
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass