<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Meu Perfil | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../js/User.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="myProfile">Meu Perfil</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>
    <main class="page-content">
      <div class="form-card">
        <div class="form-grid">
          <div class="field">
            <label for="username-input" data-i18n="username">Nome de Usuário *</label>
            <input id="username-input" type="text" data-i18n-placeholder="usernamePlaceholder" placeholder="Seu nome de usuário" autocomplete="username">
          </div>
          <div class="field">
            <label for="email-input" data-i18n="emailAddress">Endereço de Email *</label>
            <input id="email-input" type="email" data-mask="email" data-i18n-placeholder="emailPlaceholder" placeholder="seu@email.com" autocomplete="email">
          </div>
          <div class="field" id="field-password">
            <label for="password-input" data-i18n="password">Senha *</label>
            <div class="pw-wrap">
              <input id="password-input" type="password" data-i18n-placeholder="passwordPlaceholderNew" placeholder="Digite uma senha" autocomplete="new-password">
              <button class="pw-toggle" type="button" id="password-img" aria-label="Mostrar/ocultar senha"></button>
            </div>
          </div>
          <div class="field" id="field-password-confirm">
            <label for="password-confirm-input" data-i18n="confirmPassword">Confirmar Senha *</label>
            <div class="pw-wrap">
              <input id="password-confirm-input" type="password" data-i18n-placeholder="confirmPasswordPlaceholder" placeholder="Repita a senha" autocomplete="new-password">
              <button class="pw-toggle" type="button" id="password-confirm-img" aria-label="Mostrar/ocultar confirmação de senha"></button>
            </div>
          </div>
          <div class="field" id="field-change-password" style="display:none">
            <button class="btn btn-secondary" type="button" id="password-edit-btn" data-i18n="changePassword">Alterar Senha</button>
          </div>
        </div>

        <div id="notification-section" style="display:none">
          <div class="section-divider">
            <span data-i18n="emailNotifications">Notificações por E-mail</span>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="notification-enabled-input" data-i18n="weeklyReminderLabel">Lembrete semanal de lançamentos</label>
              <div class="toggle-switch">
                <input type="checkbox" id="notification-enabled-input" class="toggle-input">
                <span class="toggle-track" role="presentation">
                  <span class="toggle-thumb"></span>
                </span>
                <span class="toggle-label" id="notification-enabled-label" data-i18n="enabled">Ativado</span>
              </div>
            </div>
            <div class="field" id="field-notification-day">
              <label for="notification-day-input" data-i18n="notificationDayLabel">Dia preferido para receber</label>
              <select id="notification-day-input">
                <option value="1" data-i18n="monday">Segunda-feira</option>
                <option value="2" data-i18n="tuesday">Terça-feira</option>
                <option value="3" data-i18n="wednesday">Quarta-feira</option>
                <option value="4" data-i18n="thursday">Quinta-feira</option>
                <option value="5" data-i18n="friday" selected>Sexta-feira</option>
                <option value="6" data-i18n="saturday">Sábado</option>
                <option value="7" data-i18n="sunday">Domingo</option>
              </select>
            </div>
          </div>

          <div class="section-divider">
            <span data-i18n="preferredLanguage">Idioma Preferido</span>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="language-select" data-i18n="preferredLanguage">Idioma Preferido</label>
              <select id="language-select">
                <option value="pt" data-i18n="languagePt">Português</option>
                <option value="en" data-i18n="languageEn">English</option>
                <option value="es" data-i18n="languageEs">Español</option>
              </select>
            </div>
          </div>

        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" id="cancel-btn" type="button" data-i18n="cancel">Cancelar</button>
          <button class="btn btn-primary"   id="save-btn"   type="button" data-i18n="saveProfile">Salvar Perfil</button>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
