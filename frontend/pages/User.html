<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';</script>
  <title>Meu Perfil | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../js/User.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="myProfile">Meu Perfil</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>
    <main class="page-content">
      <div class="form-card">
        <div class="form-grid">
          <div class="field">
            <label for="username-input" data-i18n="username">Nome de UsuÃ¡rio *</label>
            <input id="username-input" type="text" data-i18n-placeholder="usernamePlaceholder" placeholder="Seu nome de usuÃ¡rio" autocomplete="username">
          </div>
          <div class="field">
            <label for="email-input" data-i18n="emailAddress">EndereÃ§o de Email *</label>
            <input id="email-input" type="email" data-mask="email" data-i18n-placeholder="emailPlaceholder" placeholder="seu@email.com" autocomplete="email">
          </div>
          <div class="field">
            <label for="password-input" data-i18n="password">Senha *</label>
            <div class="pw-wrap">
              <input id="password-input" type="password" data-i18n-placeholder="passwordPlaceholderNew" placeholder="Digite uma senha" autocomplete="new-password">
              <button class="pw-toggle" type="button" id="password-img" aria-label="Mostrar/ocultar senha"></button>
            </div>
          </div>
          <div class="field">
            <label for="password-confirm-input" data-i18n="confirmPassword">Confirmar Senha *</label>
            <div class="pw-wrap">
              <input id="password-confirm-input" type="password" data-i18n-placeholder="confirmPasswordPlaceholder" placeholder="Repita a senha" autocomplete="new-password">
              <button class="pw-toggle" type="button" id="password-confirm-img" aria-label="Mostrar/ocultar confirmaÃ§Ã£o de senha"></button>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" id="cancel-btn" type="button" data-i18n="cancel">Cancelar</button>
          <button class="btn btn-primary"   id="save-btn"   type="button" data-i18n="saveProfile">Salvar Perfil</button>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
