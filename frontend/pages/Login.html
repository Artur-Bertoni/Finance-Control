<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';</script>
  <title>Login | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../js/Login.js" type="module"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="../images/logo.png" alt="Finance Control">
      <div class="login-logo-text">Finance<span>Control</span></div>
    </div>

    <p class="login-welcome">Bem-vindo(a) de volta!</p>
    <p class="login-sub">Faça login para acessar sua conta</p>

    <div class="login-form">
      <div class="field">
        <label for="email-input">E-mail</label>
        <input id="email-input" type="email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="field" style="margin-top:14px">
        <label for="password-input">Senha</label>
        <div class="pw-wrap">
          <input id="password-input" type="password" placeholder="Sua senha" autocomplete="current-password">
          <button class="pw-toggle" type="button" id="password-img" aria-label="Mostrar/ocultar senha"></button>
        </div>
      </div>
    </div>

    <div class="login-actions">
      <button class="btn btn-secondary btn-lg" id="register-btn" type="button">Cadastrar</button>
      <button class="btn btn-primary btn-lg" id="login-btn" type="button">Entrar</button>
    </div>
  </div>
</div>
</body>
</html>
