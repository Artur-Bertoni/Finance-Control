<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';</script>
  <title>Login | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link rel="preload" href="../styles/fonts/phosphor/Phosphor.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../styles/fonts/phosphor/style.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/flag-icons/css/flag-icons.min.css">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="../js/Login.js" type="module"></script>
</head>
<body>
<div class="login-top-controls">
  <div class="login-lang-switcher">
    <button class="login-lang-trigger" id="lang-trigger" type="button" aria-label="Idioma"></button>
    <div class="login-lang-menu" id="lang-menu">
      <button class="login-lang-option" data-lang="pt" type="button"><span class="fi fi-squared fi-br"></span>Português</button>
      <button class="login-lang-option" data-lang="en" type="button"><span class="fi fi-squared fi-us"></span>English</button>
      <button class="login-lang-option" data-lang="es" type="button"><span class="fi fi-squared fi-es"></span>Español</button>
    </div>
  </div>
  <button class="theme-toggle-floating" id="theme-toggle-btn" type="button" aria-label="Alternar tema"></button>
</div>
<div class="login-page">
  <div class="login-logo">
    <img src="../images/logo.png" alt="Finance Control">
    <div class="login-logo-text">Finance<span>Control</span></div>
  </div>
  <div class="login-card">

    <p class="login-welcome" data-i18n="welcome">Bem-vindo(a) de volta!</p>
    <p class="login-sub" data-i18n="loginSubtext">Faça login para acessar sua conta</p>

    <div class="login-form">
      <div class="field">
        <label for="email-input" data-i18n="emailOrUsername">E-mail ou nome de usuário</label>
        <input id="email-input" type="text" data-i18n-placeholder="emailOrUsernamePlaceholder" placeholder="seu@email.com ou nome" autocomplete="username">
      </div>

      <div class="field" style="margin-top:14px">
        <label for="password-input" data-i18n="password">Senha</label>
        <div class="pw-wrap">
          <input id="password-input" type="password" data-i18n-placeholder="passwordPlaceholder" placeholder="Sua senha" autocomplete="current-password">
          <button class="pw-toggle" type="button" id="password-img" aria-label="Mostrar/ocultar senha"></button>
        </div>
      </div>
    </div>

    <div class="login-actions">
      <button class="btn btn-secondary btn-lg" id="register-btn" type="button" data-i18n="register">Cadastrar</button>
      <button class="btn btn-primary btn-lg" id="login-btn" type="button" data-i18n="login">Entrar</button>
    </div>

    <!-- Divisor "ou" -->
    <div class="login-divider">
      <span data-i18n="orDivider">ou</span>
    </div>

    <!-- Botões de login social -->
    <div class="login-social">
      <a href="/oauth2/authorization/google" class="btn-social btn-social-google">
        <span data-i18n="loginWithGoogle">Continuar com Google</span>
      </a>
    </div>

  </div>
</div>
</body>
</html>
