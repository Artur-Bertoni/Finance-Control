<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Dashboard | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/flatpickr.min.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="/vendor/flatpickr.min.js"></script>
  <script src="/vendor/flatpickr-l10n-pt.js"></script>
  <script src="../js/Dashboard.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" data-i18n="dashboard">Dashboard</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>

    <main class="page-content">
      <!-- Filter bar -->
      <div class="filter-section" id="filter-section">
        <button class="filter-toggle-btn" id="filter-toggle-btn" type="button" aria-expanded="false">
          <i class="ph ph-funnel"></i>
          <span data-i18n="commonFilter">Filtro</span>
          <span class="filter-toggle-active-dot"></span>
          <i class="ph ph-caret-down filter-toggle-caret"></i>
        </button>
        <div class="filter-bar">
          <div class="field">
            <label for="period-input" data-i18n="dashboardPeriod">Período</label>
            <select id="period-input">
              <option value="1m" selected data-i18n="period1m">Este mês</option>
              <option value="3m" data-i18n="period3m">Últimos 3 meses</option>
              <option value="6m" data-i18n="period6m">Últimos 6 meses</option>
              <option value="12m" data-i18n="period12m">Últimos 12 meses</option>
              <option value="ytd" data-i18n="periodYtd">Este ano</option>
            </select>
          </div>
          <div class="field">
            <label for="account-input" data-i18n="accounts">Conta</label>
            <select id="account-input">
              <option value="" data-i18n="allAccounts">Todas as contas</option>
            </select>
          </div>
          <button id="clear-filters-btn" class="btn btn-ghost btn-icon" type="button" data-i18n-title="commonClearFilters" title="Limpar filtros" aria-label="Limpar filtros" style="display:none;align-self:flex-end">
            <i class="ph ph-broom"></i>
          </button>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-card-label">
            <span data-i18n="totalIncome">Total Receitas</span>
            <button type="button" class="info-hint-btn" data-i18n-title="tipTotalIncome" title=""><i class="ph ph-info" aria-hidden="true"></i></button>
          </div>
          <div class="stat-card-value positive" id="stat-income">0,00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">
            <span data-i18n="totalExpenses">Total Despesas</span>
            <button type="button" class="info-hint-btn" data-i18n-title="tipTotalExpenses" title=""><i class="ph ph-info" aria-hidden="true"></i></button>
          </div>
          <div class="stat-card-value negative" id="stat-expenses">0,00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">
            <span data-i18n="netResult">Resultado</span>
            <button type="button" class="info-hint-btn" data-i18n-title="tipNetResult" title=""><i class="ph ph-info" aria-hidden="true"></i></button>
          </div>
          <div class="stat-card-value" id="stat-net">0,00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">
            <span data-i18n="accountBalance">Saldo em Conta(s)</span>
            <button type="button" class="info-hint-btn" data-i18n-title="tipAccountBalance" title=""><i class="ph ph-info" aria-hidden="true"></i></button>
          </div>
          <div class="stat-card-value" id="stat-wealth">0,00</div>
        </div>
      </div>

      <!-- Charts 2x2 grid -->
      <div class="dashboard-charts-grid">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="incomeVsExpenses">Receitas vs Despesas</span>
          </div>
          <div class="chart-container">
            <canvas id="chart-monthly"></canvas>
            <div class="chart-empty-state" id="chart-monthly-empty" style="display:none">
              <p data-i18n="noData">Sem dados no período</p>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="expensesByCategory">Despesas por Categoria</span>
          </div>
          <div class="chart-donut-wrap">
            <div class="chart-container">
              <canvas id="chart-cat-expenses"></canvas>
              <div class="chart-empty-state" id="chart-cat-expenses-empty" style="display:none">
                <p data-i18n="noData">Sem dados no período</p>
              </div>
            </div>
            <div class="donut-legend" id="chart-cat-expenses-legend"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="balanceEvolution">Evolução do Saldo</span>
          </div>
          <div class="chart-container">
            <canvas id="chart-wealth"></canvas>
            <div class="chart-empty-state" id="chart-wealth-empty" style="display:none">
              <p data-i18n="noData">Sem dados no período</p>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="incomeByCategory">Receitas por Categoria</span>
          </div>
          <div class="chart-donut-wrap">
            <div class="chart-container">
              <canvas id="chart-cat-income"></canvas>
              <div class="chart-empty-state" id="chart-cat-income-empty" style="display:none">
                <p data-i18n="noData">Sem dados no período</p>
              </div>
            </div>
            <div class="donut-legend" id="chart-cat-income-legend"></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>
</body>
</html>
