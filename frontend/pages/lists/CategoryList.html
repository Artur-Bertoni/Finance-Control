<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Categorias | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link href="../../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="../../js/lists/CategoryList.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" data-i18n="categories">Categorias</h1>
    </header>
    <main class="page-content">
      <div class="filter-section" id="filter-section">
        <button class="filter-toggle-btn" id="filter-toggle-btn" type="button" aria-expanded="false">
          <i class="ph ph-funnel"></i>
          <span data-i18n="commonFilter">Filtro</span>
          <span class="filter-toggle-active-dot"></span>
          <i class="ph ph-caret-down filter-toggle-caret"></i>
        </button>
        <div class="dashboard-search-bar">
          <div class="field">
            <label for="search-input" data-i18n="searchByName">Buscar por nome</label>
            <input type="text" id="search-input" autocomplete="off" data-i18n-placeholder="searchByNamePlaceholder" placeholder="Digite o nome...">
          </div>
          <div class="filter-clear-field" style="display:none">
            <button class="btn btn-ghost btn-sm filter-clear-btn" id="clear-search-btn" data-i18n-title="commonClearFilters" title="Limpar filtros" aria-label="Limpar filtros"><i class="ph ph-broom"></i></button>
          </div>
        </div>
      </div>
      <div class="dashboard-items-scroll">
        <div id="categories-list" class="items-grid"></div>
      </div>
    </main>
  </div>
</div>

<template id="tpl-category-card">
  <div class="item-card">
    <div class="item-card-header">
      <span class="item-card-name-group">
        <span class="cat-icon" style="font-size:18px;color:var(--primary);flex-shrink:0" hidden></span>
        <span class="item-card-name"></span>
      </span>
      <span class="item-card-badge"></span>
    </div>
    <div class="item-card-meta cat-aliases" hidden><span class="item-card-row"></span></div>
    <div class="item-card-meta cat-desc" hidden><div class="item-card-row"></div></div>
  </div>
</template>
</body>
</html>
