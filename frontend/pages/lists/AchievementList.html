<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Conquistas | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link href="../../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="../../js/lists/AchievementList.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" data-i18n="achievements">Conquistas</h1>
    </header>
    <main class="page-content">
      <div id="achievements-grid" class="achievements-grid"></div>
    </main>
  </div>
</div>

<template id="tpl-achievement-section">
  <div class="achievement-section">
    <h2 class="achievement-tier-heading"></h2>
    <div class="achievement-row"></div>
  </div>
</template>
<template id="tpl-achievement-card">
  <div class="achievement-card">
    <div class="achievement-icon"></div>
    <div class="achievement-title"></div>
    <div class="achievement-desc"></div>
  </div>
</template>
</body>
</html>
