<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Instituição Financeira | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link href="../../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="../../js/views/FinancialInstitutionView.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="financialInstitutions">Instituições Financeiras</h1>
      <div class="topbar-actions" id="header-actions">
        <button class="btn btn-primary btn-sm" id="edit-btn" type="button" data-i18n="commonEdit">Editar</button>
      </div>
    </header>

    <main class="page-content">
      <div class="detail-card">
        <div class="view-tabs" role="tablist">
          <button class="view-tab view-tab--active" data-tab="details" role="tab" data-i18n="tabDetails">Detalhes</button>
          <button class="view-tab" data-tab="history" role="tab" data-i18n="tabHistory">Histórico</button>
        </div>

        <div id="tab-details" class="view-tab-content">
          <div class="detail-grid">
            <div class="detail-field">
              <label for="detail-name" data-i18n="institutionName">Nome</label>
              <p id="detail-name">-</p>
            </div>
            <div class="detail-field" id="icon-row" style="display:none">
              <span class="detail-label" data-i18n="categoryIcon">Ícone</span>
              <div id="detail-icon" style="display:flex;align-items:center;gap:8px;font-size:22px;color:var(--primary)"></div>
            </div>
            <div class="detail-field">
              <label for="detail-address" data-i18n="institutionAddress">Endereço</label>
              <p id="detail-address">-</p>
            </div>
            <div class="detail-field">
              <label for="detail-contact" data-i18n="institutionContact">Contato</label>
              <p id="detail-contact">-</p>
            </div>
          </div>
        </div>

        <div id="tab-history" class="view-tab-content" style="display:none">
          <div id="history-container"></div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
