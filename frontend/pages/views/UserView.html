<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Meu Perfil | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link href="../../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="../../js/views/UserView.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="myProfile">Meu Perfil</h1>
      <div class="topbar-actions" id="header-actions">
        <button class="btn btn-danger btn-sm" id="delete-btn" type="button" data-i18n="commonDelete">Excluir</button>
        <button class="btn btn-primary btn-sm" id="edit-btn" type="button" data-i18n="commonEdit">Editar</button>
      </div>
    </header>

    <main class="page-content">
      <div class="detail-card">
        <div class="view-tabs" role="tablist">
          <button class="view-tab view-tab--active" data-tab="details" role="tab" data-i18n="tabDetails">Detalhes</button>
          <button class="view-tab" data-tab="history" role="tab" data-i18n="tabHistory">Histórico</button>
        </div>

        <div id="tab-details" class="view-tab-content">
        <div class="section-divider section-divider--first">
          <span data-i18n="personalData">Dados Pessoais</span>
        </div>
        <div class="detail-grid">
          <div class="detail-field">
            <label for="detail-username" data-i18n="username">Nome de Usuário</label>
            <p id="detail-username">-</p>
          </div>
          <div class="detail-field">
            <label for="detail-email" data-i18n="emailAddress">E-mail</label>
            <p id="detail-email">-</p>
          </div>
          <div class="detail-field">
            <label for="detail-language" data-i18n="preferredLanguage">Idioma Preferido</label>
            <p id="detail-language">-</p>
          </div>
        </div>

        <div class="section-divider">
          <span data-i18n="emailNotifications">Notificações por E-mail</span>
        </div>
        <div class="detail-grid">
          <div class="detail-field">
            <div style="display:flex;align-items:flex-start;gap:0">
              <div>
                <label for="detail-notification-status" data-i18n="weeklyReminderLabel">Lembrete semanal de lançamentos</label>
                <p><span id="detail-notification-status" class="tx-badge">-</span></p>
              </div>
              <div style="width:1px;background:var(--border);margin:0 20px;align-self:stretch"></div>
              <div>
                <label for="detail-notification-day" data-i18n="notificationDayLabel">Dia de envio</label>
                <p id="detail-notification-day">-</p>
              </div>
            </div>
          </div>
          <div class="detail-field">
            <label for="detail-goal-notification-status" data-i18n="goalNotificationsLabel">Notificações de metas financeiras</label>
            <p><span id="detail-goal-notification-status" class="tx-badge">-</span></p>
          </div>
        </div>

        <div class="section-divider">
          <span data-i18n="linkedAccounts">Contas Vinculadas</span>
        </div>
        <div class="detail-grid">
          <div class="detail-field">
            <label for="detail-google-status" style="display:flex;align-items:center;gap:6px">
              <span data-i18n="googleAccount">Conta Google</span>
            </label>
            <p><span id="detail-google-status" class="tx-badge">-</span></p>
          </div>
        </div>

        </div>

        <div id="tab-history" class="view-tab-content" style="display:none">
          <div id="history-container"></div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
