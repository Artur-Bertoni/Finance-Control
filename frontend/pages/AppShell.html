<!DOCTYPE html>
<html lang="pt-BR" id="root-html">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';</script>
  <title>Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">
  <link rel="preload" href="../styles/fonts/phosphor/Phosphor.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../styles/fonts/phosphor/style.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <script src="../js/AppShell.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../images/logo.png" alt="Finance Control" class="sidebar-logo">
      <div class="sidebar-logo-text">Finance<span>Control</span></div>
    </div>
    <div class="sidebar-search">
      <button class="sidebar-search-toggle" id="search-toggle-btn" aria-expanded="false" aria-controls="search-panel">
        <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
        <span data-i18n="quickSearch">Busca Rápida</span>
        <span class="search-global-shortcut">(Ctrl+Shift+F)</span>
        <i class="ph ph-caret-down search-chevron" aria-hidden="true"></i>
      </button>
      <div class="sidebar-search-panel" id="search-panel">
        <input type="text" id="search-input" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Digite para buscar..." autocomplete="off" spellcheck="false">
        <div id="search-shortcuts-hint" class="search-shortcuts-hint"></div>
        <div id="search-results" class="search-results"></div>
      </div>
    </div>
    <nav class="sidebar-nav" aria-label="Menu principal">
      <a href="/pages/HomePage.html" class="sidebar-link" data-i18n="home">Início</a>
      <a href="/pages/Dashboard.html" class="sidebar-link" data-i18n="dashboard">Dashboard</a>
      <a href="/pages/lists/GoalList.html" class="sidebar-link" data-i18n="goals">Metas Financeiras</a>
      <a href="/pages/lists/AchievementList.html" class="sidebar-link" data-i18n="achievements">Conquistas</a>
      <a href="/pages/FinnyCenter.html" class="sidebar-link sidebar-link--finny" id="notifications-link"><span data-i18n="finnyLink">Finny</a>
      <div class="sidebar-section" data-i18n="movements">Movimentações</div>
      <a href="/pages/crud/Transaction.html" class="sidebar-link" data-i18n="newTransaction">Nova Transação</a>
      <a href="/pages/crud/Transfer.html" class="sidebar-link" data-i18n="transfer">Transferência</a>
      <a href="/pages/StatementImport.html" class="sidebar-link" data-i18n="statementImport">Importar Extrato</a>
      <div class="sidebar-section" data-i18n="settings">Configurações</div>
      <a href="/pages/lists/CategoryList.html" class="sidebar-link" data-i18n="categories">Categorias</a>
      <a href="/pages/lists/AccountList.html" class="sidebar-link" data-i18n="accounts">Contas</a>
      <a href="/pages/lists/FinancialInstitutionList.html" class="sidebar-link" data-i18n="financialInstitutions">Instituições Financeiras</a>
      <a href="/pages/lists/TransactionLocaleList.html" class="sidebar-link" data-i18n="locations">Locais</a>
      <a href="/pages/Feedback.html" class="sidebar-link" data-i18n="feedback">Feedback</a>
      <a href="/pages/admin/FeedbackAdmin.html" class="sidebar-link" id="admin-feedbacks-link" data-i18n="adminFeedbacks" hidden>Feedbacks (Admin)</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/pages/views/UserView.html" class="sidebar-link" data-i18n="myProfile">Meu Perfil</a>
    </div>
  </aside>

  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <button class="btn btn-ghost back-btn" id="back-btn" style="display:none" title="Voltar" aria-label="Voltar"><i class="ph ph-arrow-left" aria-hidden="true"></i></button>
      <nav class="breadcrumb" id="breadcrumb" aria-label="Navegação">
        <span class="page-title" id="page-title-text">Finance Control</span>
      </nav>
      <div class="topbar-actions" id="header-actions"></div>
    </header>
    <main class="page-content" id="view"></main>
  </div>

</div>

<!-- Mascote Finny — botão flutuante -->
<!-- Finny — botão flutuante com badge de não lidas -->
<button id="mascot-fab" class="mascot-fab" type="button" aria-label="Finny" title="Finny — dicas e notificações">
  <span data-finny-svg=""></span>
  <span id="mascot-fab-badge" class="mascot-fab-badge" hidden></span>
</button>

<!-- Painel do Finny — duas abas: Dicas | Mensagens -->
<div id="mascot-panel" class="mascot-panel" hidden>

  <!-- Cabeçalho -->
  <div class="mascot-panel-header">
    <span class="mascot-panel-title">
      <span data-finny-svg="mascot-header-svg"></span>
      Finny
    </span>
    <button id="mascot-close" class="mascot-close-btn" type="button" aria-label="Fechar">
      <i class="ph ph-x" aria-hidden="true"></i>
    </button>
  </div>

  <!-- Abas -->
  <div class="mascot-panel-tabs">
    <button id="mascot-tab-tips" class="mascot-tab-btn mascot-tab-btn--active" type="button" data-i18n="mascotTabTips">Dicas</button>
    <button id="mascot-tab-messages" class="mascot-tab-btn" type="button">
      <span data-i18n="mascotTabMessages">Mensagens</span>
      <span id="mascot-tab-badge" class="mascot-tab-badge" hidden></span>
    </button>
  </div>

  <!-- Conteúdo: Dicas -->
  <div id="mascot-content-tips" class="mascot-panel-tab-content">
    <div class="mascot-panel-body">
      <span data-finny-svg="mascot-body-svg"></span>
      <p id="mascot-tip-text" class="mascot-tip-text"></p>
    </div>
    <div class="mascot-panel-footer">
      <span id="mascot-tip-countdown" class="mascot-tip-countdown"></span>
    </div>
  </div>

  <!-- Conteúdo: Mensagens -->
  <div id="mascot-content-messages" class="mascot-panel-tab-content" hidden>
    <div id="mascot-notifications-list" class="mascot-notif-list"></div>
    <div id="mascot-notif-footer" class="mascot-notif-footer" hidden>
      <button id="mascot-mark-all-read" class="btn btn-ghost btn-sm" type="button" data-i18n="markAllRead">Marcar todas como lidas</button>
    </div>
  </div>

</div>

</body>
</html>
