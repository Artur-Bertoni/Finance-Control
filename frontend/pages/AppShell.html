<!DOCTYPE html>
<html lang="pt-BR" id="root-html">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';</script>
  <title>Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/flatpickr.min.css">
  <link rel="stylesheet" href="/vendor/flag-icons/css/flag-icons.min.css">
  <link rel="preload" href="../styles/fonts/phosphor/Phosphor.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../styles/fonts/phosphor/style.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="/vendor/flatpickr.min.js"></script>
  <script src="/vendor/flatpickr-l10n-pt.js"></script>
  <script src="../js/AppShell.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="/images/logo.png" alt="Finance Control" class="sidebar-logo">
      <div class="sidebar-logo-text">Finance<span>Control</span></div>
    </div>
    <div class="sidebar-search">
      <button class="sidebar-search-toggle" id="search-toggle-btn" aria-expanded="false" aria-controls="search-panel">
        <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
        <span data-i18n="quickSearch">Busca Rápida</span>
        <span class="search-global-shortcut">(Ctrl+Shift+F)</span>
        <i class="ph ph-caret-down search-chevron" aria-hidden="true"></i>
      </button>
      <div class="sidebar-search-panel" id="search-panel">
        <input type="text" id="search-input" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Digite para buscar..." autocomplete="off" spellcheck="false">
        <div id="search-shortcuts-hint" class="search-shortcuts-hint"></div>
        <div id="search-results" class="search-results"></div>
      </div>
    </div>
    <nav class="sidebar-nav" aria-label="Menu principal">
      <a href="/pages/HomePage.html" class="sidebar-link" data-i18n="home">Início</a>
      <a href="/pages/Dashboard.html" class="sidebar-link" data-i18n="dashboard">Dashboard</a>
      <a href="/pages/Budget.html" class="sidebar-link" data-i18n="budget">Orçamento</a>
      <a href="/pages/lists/GoalList.html" class="sidebar-link" data-i18n="goals">Metas Financeiras</a>
      <a href="/pages/lists/AchievementList.html" class="sidebar-link" data-i18n="achievements">Conquistas</a>
      <a href="/pages/FinnyCenter.html" class="sidebar-link sidebar-link--finny" id="notifications-link"><span data-i18n="finnyLink">Finny</a>
      <div class="sidebar-section" data-i18n="movements">Movimentações</div>
      <a href="/pages/crud/Transaction.html" class="sidebar-link" data-i18n="newTransaction">Nova Transação</a>
      <a href="/pages/crud/Transfer.html" class="sidebar-link" data-i18n="transfer">Transferência</a>
      <a href="/pages/StatementImport.html" class="sidebar-link" data-i18n="statementImport">Importar Extrato</a>
      <div class="sidebar-section" data-i18n="settings">Configurações</div>
      <a href="/pages/lists/CategoryList.html" class="sidebar-link" data-i18n="categories">Categorias</a>
      <a href="/pages/lists/AccountList.html" class="sidebar-link" data-i18n="accounts">Contas</a>
      <button type="button" class="sidebar-link sidebar-advanced-toggle" id="advanced-nav-toggle" aria-expanded="false" aria-controls="advanced-nav">
        <span data-i18n="advancedSettings">Avançado</span>
        <i class="ph ph-caret-down sidebar-advanced-caret" aria-hidden="true"></i>
      </button>
      <div class="sidebar-advanced" id="advanced-nav" hidden>
        <a href="/pages/lists/FinancialInstitutionList.html" class="sidebar-link" data-i18n="financialInstitutions">Instituições Financeiras</a>
        <a href="/pages/lists/TransactionLocaleList.html" class="sidebar-link" data-i18n="locations">Locais</a>
      </div>
      <div class="sidebar-section" data-i18n="feedbackSection">Feedback</div>
      <a href="/pages/Feedback.html" class="sidebar-link" data-i18n="sendFeedback">Enviar Feedback</a>
      <div class="sidebar-section" id="admin-section" data-i18n="adminSection" hidden>Administração</div>
      <a href="/pages/admin/Admin.html" class="sidebar-link" id="admin-link" data-i18n="adminPanel" hidden>Admin</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/pages/views/UserView.html" class="sidebar-link" data-i18n="myProfile">Meu Perfil</a>
    </div>
  </aside>

  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <button class="btn btn-ghost back-btn" id="back-btn" style="display:none" title="Voltar" aria-label="Voltar"><i class="ph ph-arrow-left" aria-hidden="true"></i></button>
      <nav class="breadcrumb" id="breadcrumb" aria-label="Navegação">
        <span class="page-title" id="page-title-text">Finance Control</span>
      </nav>
      <div class="topbar-actions" id="header-actions"></div>
    </header>
    <main class="page-content" id="view"></main>
  </div>

</div>

<!-- Mascote Finny - botão flutuante -->
<button id="mascot-fab" class="mascot-fab" type="button" aria-label="Finny" title="Finny - dicas e notificações">
  <span data-finny-svg=""></span>
</button>

<!-- Painel do Finny - duas abas: Dicas | Mensagens -->
<div id="mascot-panel" class="mascot-panel" hidden>

  <!-- Cabeçalho -->
  <div class="mascot-panel-header">
    <span class="mascot-panel-title">
      <span data-finny-svg="mascot-header-svg"></span>
      Finny
    </span>
    <button id="mascot-close" class="mascot-close-btn" type="button" aria-label="Fechar">
      <i class="ph ph-x" aria-hidden="true"></i>
    </button>
  </div>

  <!-- Abas -->
  <div class="mascot-panel-tabs">
    <button id="mascot-tab-tips" class="mascot-tab-btn mascot-tab-btn--active" type="button" data-i18n="mascotTabTips">Dicas</button>
    <button id="mascot-tab-messages" class="mascot-tab-btn" type="button" data-i18n="mascotTabMessages">Mensagens</button>
  </div>

  <!-- Conteúdo: Dicas -->
  <div id="mascot-content-tips" class="mascot-panel-tab-content">
    <div class="mascot-panel-body">
      <span data-finny-svg="mascot-body-svg"></span>
      <p id="mascot-tip-text" class="mascot-tip-text"></p>
    </div>
    <div id="mascot-tip-feedback" class="finny-feedback-bar" hidden>
      <button class="finny-fb-btn" data-fb="HELPFUL" type="button" data-i18n-title="finnyFeedbackHelpful" title="Útil">👍</button>
      <button class="finny-fb-btn" data-fb="NOT_HELPFUL" type="button" data-i18n-title="finnyFeedbackNotHelpful" title="Não foi útil">👎</button>
      <button class="finny-fb-btn" data-fb="DISMISSED" type="button" data-i18n-title="finnyFeedbackDismiss" title="Dispensar">✕</button>
    </div>
    <div class="mascot-panel-footer mascot-panel-footer--nav">
      <button id="mascot-tip-prev" class="btn btn-ghost btn-sm finny-nav-btn" type="button" aria-label="‹">‹</button>
      <span id="mascot-tip-counter" class="mascot-dashboard-counter"></span>
      <button id="mascot-tip-next" class="btn btn-ghost btn-sm finny-nav-btn" type="button" aria-label="›">›</button>
      <span id="mascot-tip-countdown" class="mascot-tip-countdown"></span>
    </div>
  </div>

  <!-- Conteúdo: Mensagens (somente leitura) -->
  <div id="mascot-content-messages" class="mascot-panel-tab-content" hidden>
    <div id="mascot-notifications-list" class="mascot-notif-list"></div>
  </div>

</div>

<!-- Templates do FAB do Finny (o JS apenas clona e preenche) -->
<template id="tpl-mascot-notif-card">
  <div class="mascot-notif-card">
    <span class="mascot-notif-icon"></span>
    <div class="mascot-notif-body">
      <p class="mascot-notif-title"><span class="mn-label"></span><strong class="mn-name"></strong></p>
      <p class="mascot-notif-date"></p>
    </div>
    <div class="mascot-notif-actions">
      <button class="btn btn-ghost btn-sm notif-view-btn"></button>
    </div>
  </div>
</template>
<template id="tpl-mascot-local-card">
  <div class="mascot-notif-card mascot-notif-card--local">
    <span class="mascot-notif-local-bar"></span>
    <div class="mascot-notif-body">
      <p class="mascot-notif-title"></p>
      <p class="mascot-notif-date"></p>
    </div>
    <div class="mascot-notif-actions">
      <button class="btn btn-ghost btn-sm local-view-btn"></button>
    </div>
  </div>
</template>
<template id="tpl-mascot-empty">
  <div class="mascot-notif-empty"></div>
</template>

<!-- Templates do histórico de alterações (ChangeHistoryManager, usado nas telas de detalhe) -->
<template id="tpl-hist-timeline"><div class="history-timeline"></div></template>
<template id="tpl-hist-empty"><p class="history-empty"></p></template>
<template id="tpl-hist-creation">
  <div class="history-group history-group--creation">
    <div class="history-group-header">
      <span class="history-group-marker history-group-marker--creation"></span>
      <span class="history-group-label history-group-label--creation"></span>
    </div>
  </div>
</template>
<template id="tpl-hist-change-group">
  <div class="history-group">
    <div class="history-group-header">
      <span class="history-group-marker"></span>
      <span class="history-group-label"></span>
    </div>
    <div class="history-changes"></div>
  </div>
</template>
<template id="tpl-hist-change-item">
  <div class="history-change-item">
    <span class="history-field-name"></span>
    <span class="history-value-old"></span>
    <span class="history-arrow">→</span>
    <span class="history-value-new"></span>
  </div>
</template>
<template id="tpl-hist-password">
  <div class="history-group">
    <div class="history-group-header">
      <span class="history-group-marker"></span>
      <span class="history-group-label"></span>
    </div>
    <div class="history-changes">
      <div class="history-change-item"><span class="history-field-name"></span></div>
    </div>
  </div>
</template>

</body>
</html>
