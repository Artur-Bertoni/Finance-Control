<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Finny | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <script src="../js/NotificationCenter.js" type="module"></script>
</head>
<body>
<header class="topbar">
  <span class="page-title" data-i18n="finnyLink">Finny</span>
  <div id="header-actions"></div>
</header>
<main class="page-content">

  <!-- Hero -->
  <div class="finny-page-hero">
    <span data-finny-svg="finny-page-hero-svg"></span>
    <div class="finny-page-hero-text">
      <h2 class="finny-page-hero-name">Finny</h2>
      <p class="finny-page-hero-sub" data-i18n="mascotAssistant">Seu assistente financeiro</p>
    </div>
  </div>

  <!-- Abas -->
  <div class="finny-page-tabs">
    <button id="nc-tab-tips" class="finny-page-tab finny-page-tab--active" type="button" data-i18n="mascotTabTips">Dicas</button>
    <button id="nc-tab-messages" class="finny-page-tab" type="button">
      <span data-i18n="mascotTabMessages">Mensagens</span>
      <span id="nc-tab-badge" class="mascot-tab-badge" hidden></span>
    </button>
  </div>

  <!-- Conteúdo: Dicas -->
  <div id="nc-content-tips" class="finny-page-tab-content">
    <div class="finny-page-tip-body">
      <p id="nc-tip-text" class="finny-page-tip-text"></p>
    </div>
    <div class="finny-page-tip-nav">
      <span id="nc-tip-countdown" class="mascot-tip-countdown"></span>
    </div>
  </div>

  <!-- Conteúdo: Mensagens -->
  <div id="nc-content-messages" class="finny-page-tab-content" hidden>
    <div class="finny-page-msg-toolbar">
      <button id="nc-mark-all-read" class="btn btn-ghost btn-sm" type="button" data-i18n="markAllRead">Marcar todas como lidas</button>
    </div>
    <div id="nc-notifications-list" class="finny-page-notif-list"></div>
  </div>

</main>
</body>
</html>
