<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Transação | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <script src="../js/Transaction.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../images/logo.png" alt="Finance Control" class="sidebar-logo">
      <span class="sidebar-brand">Finance<br>Control</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/pages/HomePage.html" class="sidebar-link">Início</a>
      <div class="sidebar-section">Movimentações</div>
      <a href="/pages/Transaction.html" class="sidebar-link">Nova Transação</a>
      <a href="/pages/Transfer.html" class="sidebar-link">Transferência</a>
      <a href="/pages/AccountDashboard.html" class="sidebar-link">Contas</a>
      <div class="sidebar-section">Configurações</div>
      <a href="/pages/CategoryDashboard.html" class="sidebar-link">Categorias</a>
      <a href="/pages/FinancialInstitutionDashboard.html" class="sidebar-link">Instituições Financeiras</a>
      <a href="/pages/TransactionLocaleDashboard.html" class="sidebar-link">Locais</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/pages/User.html" class="sidebar-link">Meu Perfil</a>
    </div>
  </aside>

  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text">Nova Transação</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>

    <main class="page-content">
      <div class="form-card">
        <div class="form-grid">
          <div class="field">
            <label for="account-input">Conta *</label>
            <div class="select-with-add">
              <select id="account-input">
                <option disabled selected value="">Selecione a conta</option>
              </select>
              <button type="button" class="btn-add-inline" id="account-add-btn" title="Nova conta" data-icon="add"></button>
            </div>
          </div>

          <div class="field">
            <label for="category-input">Categoria *</label>
            <div class="select-with-add">
              <select id="category-input">
                <option disabled selected value="">Selecione a categoria</option>
              </select>
              <button type="button" class="btn-add-inline" id="category-add-btn" title="Nova categoria" data-icon="add"></button>
            </div>
          </div>

          <div class="field">
            <span class="field-label" style="font-size:12.5px;font-weight:600;color:var(--text-secondary)">Tipo de Transação *</span>
            <div class="radio-group">
              <label class="radio-option" id="debit-option">
                <input type="radio" name="typeRadio" id="debit-radio" value="debit">
                Débito
              </label>
              <label class="radio-option" id="credit-option">
                <input type="radio" name="typeRadio" id="credit-radio" value="credit">
                Crédito
              </label>
            </div>
          </div>

          <div class="form-grid two-col">
            <div class="field">
              <label for="date-input">Data *</label>
              <input id="date-input" type="date">
            </div>
            <div class="field">
              <label for="value-input">Valor ($) *</label>
              <input id="value-input" type="number" step=".01" min="0" placeholder="0,00">
            </div>
          </div>

          <div class="field">
            <label for="installments-number-input">Nº de Parcelas <span style="color:var(--text-muted);font-weight:400">(deixe 0 para à vista)</span></label>
            <input id="installments-number-input" type="number" min="0" placeholder="0">
          </div>

          <div class="field">
            <label for="transaction-locale-input">Local da Transação</label>
            <div class="select-with-add">
              <select id="transaction-locale-input">
                <option disabled selected value="">Selecione o local (opcional)</option>
              </select>
              <button type="button" class="btn-add-inline" id="locale-add-btn" title="Novo local" data-icon="add"></button>
            </div>
          </div>

          <div class="field">
            <label for="obs-input">Observações</label>
            <textarea id="obs-input" placeholder="Detalhes adicionais sobre a transação…"></textarea>
          </div>

          <input type="hidden" id="transfer-partner-id" value="0">
        </div>

        <div class="form-actions">
          <button class="btn btn-secondary" id="cancel-btn" type="button">Cancelar</button>
          <button class="btn btn-primary" id="save-btn" type="button">Salvar Transação</button>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
</body>
</html>
