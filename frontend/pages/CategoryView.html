<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Categoria | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../js/CategoryView.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="categories">Categorias</h1>
      <div class="topbar-actions" id="header-actions">
        <button class="btn btn-danger btn-sm" id="delete-btn" type="button" data-i18n="delete">Excluir</button>
        <button class="btn btn-primary btn-sm" id="edit-btn" type="button" data-i18n="edit">Editar</button>
      </div>
    </header>

    <main class="page-content">
      <div class="detail-card">
        <div class="detail-grid">
          <div class="detail-field">
            <label for="detail-name" data-i18n="categoryName">Nome</label>
            <p id="detail-name">—</p>
          </div>
          <div class="detail-field" style="grid-column: 1 / -1">
            <label for="detail-description" data-i18n="categoryDescription">Descrição</label>
            <p id="detail-description">—</p>
          </div>
          <div class="detail-field" id="aliases-row" style="display:none;grid-column: 1 / -1">
            <div style="display:flex;align-items:center;gap:6px">
              <span class="detail-label" data-i18n="categoryAliases">Nomes Internos</span>
              <button type="button" class="info-hint-btn" data-i18n-title="categoryAliasesHint" title="">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459-2.066A1.75 1.75 0 009.253 9H9z" clip-rule="evenodd"/></svg>
              </button>
            </div>
            <div id="detail-aliases" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
