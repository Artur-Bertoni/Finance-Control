<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Início | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/flatpickr.min.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="/vendor/flatpickr.min.js"></script>
  <script src="/vendor/flatpickr-l10n-pt.js"></script>
  <script src="../js/HomePage.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" data-i18n="home">Início</h1>
      <div class="topbar-actions" id="header-actions">
        <a href="/pages/crud/Transaction.html" class="btn btn-primary btn-sm" data-i18n="newTransaction">
          Nova Transação
        </a>
      </div>
    </header>

    <main class="page-content">
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-card-label">
            <span data-i18n="accountBalance">Saldo em Conta(s)</span>
            <button type="button" class="info-hint-btn" data-i18n-title="tipAccountBalance" title=""><i class="ph ph-info" aria-hidden="true"></i></button>
          </div>
          <div class="stat-card-value" id="home-total-box">0,00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">
            <span data-i18n="filteredValue">Valor pelo Filtro</span>
            <button type="button" class="info-hint-btn" data-i18n-title="tipFilteredValue" title=""><i class="ph ph-info" aria-hidden="true"></i></button>
          </div>
          <div class="stat-card-value" id="filtered-total-box">0,00</div>
        </div>
      </div>

      <div class="filter-section" id="filter-section">
        <button class="filter-toggle-btn" id="filter-toggle-btn" type="button" aria-expanded="false">
          <i class="ph ph-funnel"></i>
          <span data-i18n="commonFilter">Filtro</span>
          <span class="filter-toggle-active-dot"></span>
          <i class="ph ph-caret-down filter-toggle-caret"></i>
        </button>
        <div class="filter-bar">
          <div class="field">
            <label for="start-date-input" data-i18n="startDate">Data de Início</label>
            <input id="start-date-input" type="date">
          </div>
          <div class="field">
            <label for="end-date-input" data-i18n="endDate">Data de Fim</label>
            <input id="end-date-input" type="date">
          </div>
          <div class="field">
            <label for="category-input" data-i18n="categories">Categoria</label>
            <select id="category-input">
              <option value="" data-i18n="allCategories">Todas as categorias</option>
            </select>
          </div>
          <div class="field">
            <label for="account-input" data-i18n="accounts">Conta</label>
            <select id="account-input">
              <option value="" data-i18n="allAccounts">Todas as contas</option>
            </select>
          </div>
          <div class="filter-clear-field" style="display:none">
            <button class="btn btn-ghost btn-sm filter-clear-btn" id="clear-filters-btn" data-i18n-title="commonClearFilters" title="Limpar filtros" aria-label="Limpar filtros"><i class="ph ph-broom"></i></button>
          </div>
        </div>
      </div>

      <div class="card transactions-card">
        <div class="card-header">
          <div class="card-title-group">
            <span class="card-title" data-i18n="latestTransactions">Últimas Transações</span>
            <a href="/pages/crud/Transaction.html" class="btn btn-primary btn-sm" data-i18n="newTransaction">Nova Transação</a>
          </div>
        </div>
        <div class="transactions-list" id="last-transaction-list">
          <div class="empty-state">
            <p data-i18n="noTransactionsFound">Nenhuma transação encontrada</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<template id="tpl-transaction-item">
  <div class="transaction-item">
    <div class="tx-indicator"></div>
    <div class="tx-info">
      <div class="tx-category">
        <i class="tx-cat-icon ph" hidden></i>
        <span class="tx-cat-name"></span>
      </div>
      <div class="tx-meta">
        <span class="tx-account"></span>
        <span class="tx-locale" hidden></span>
        <span class="tx-date"></span>
        <span class="tx-installments" hidden></span>
      </div>
    </div>
    <span class="tx-badge"></span>
    <div class="tx-value"></div>
  </div>
</template>
</body>
</html>
