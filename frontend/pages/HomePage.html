<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../js/HomePage.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../images/logo.png" alt="Finance Control" class="sidebar-logo">
      <span class="sidebar-brand">Finance<br>Control</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/pages/HomePage.html" class="sidebar-link">Início</a>
      <div class="sidebar-section">Movimentações</div>
      <a href="/pages/Transaction.html" class="sidebar-link">Nova Transação</a>
      <a href="/pages/Transfer.html" class="sidebar-link">Transferência</a>
      <a href="/pages/AccountDashboard.html" class="sidebar-link">Contas</a>
      <div class="sidebar-section">Configurações</div>
      <a href="/pages/CategoryDashboard.html" class="sidebar-link">Categorias</a>
      <a href="/pages/FinancialInstitutionDashboard.html" class="sidebar-link">Instituições Financeiras</a>
      <a href="/pages/TransactionLocaleDashboard.html" class="sidebar-link">Locais</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/pages/User.html" class="sidebar-link">Meu Perfil</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title">Início</h1>
      <div class="topbar-actions" id="header-actions">
        <a href="/pages/Transaction.html" class="btn btn-primary btn-sm">
          Nova Transação
        </a>
      </div>
    </header>

    <main class="page-content">
      <!-- Stat cards -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-card-label">Saldo em Conta(s)</div>
          <div class="stat-card-value" id="home-total-box">$ 0,00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Valor pelo Filtro</div>
          <div class="stat-card-value" id="filtered-total-box">$ 0,00</div>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <div class="field">
          <label for="start-date-input">Data de Início</label>
          <input id="start-date-input" type="date">
        </div>
        <div class="field">
          <label for="end-date-input">Data de Fim</label>
          <input id="end-date-input" type="date">
        </div>
        <div class="field">
          <label for="category-input">Categoria</label>
          <select id="category-input">
            <option value="">Todas as categorias</option>
          </select>
        </div>
        <div class="field">
          <label for="account-input">Conta</label>
          <select id="account-input">
            <option value="">Todas as contas</option>
          </select>
        </div>
      </div>

      <!-- Transaction list -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Últimas Transações</span>
        </div>
        <div class="transactions-list" id="last-transaction-list">
          <div class="empty-state">
            <p>Nenhuma transação encontrada</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
