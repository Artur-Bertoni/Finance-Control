<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Meta Financeira | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <script src="../js/Goal.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="newGoal">Nova Meta</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>
    <main class="page-content">
      <div class="form-card">
        <div class="form-grid">

          <!-- Name -->
          <div class="field">
            <label for="name-input" data-i18n="goalName">Nome da Meta</label>
            <input id="name-input" type="text" data-i18n-placeholder="goalNamePlaceholder"
                   placeholder="Ex: Economizar para viagem..." required>
          </div>

          <!-- Type -->
          <div class="field">
            <label for="type-select" data-i18n="goalType">Tipo de Meta</label>
            <select id="type-select" required>
              <option value="" data-i18n="goalSelectType">Selecione o tipo...</option>
              <option value="expense_limit" data-i18n="goalTypeExpenseLimit">Limite de Gastos</option>
              <option value="savings" data-i18n="goalTypeSavings">Economia / Acúmulo</option>
              <option value="income" data-i18n="goalTypeIncome">Receita</option>
            </select>
          </div>

          <!-- Target amount -->
          <div class="field">
            <label for="target-input" data-i18n="goalTargetAmount">Valor Alvo ($)</label>
            <input id="target-input" type="text" inputmode="numeric" data-mask="money" placeholder="0,00" required>
          </div>

          <!-- Start date -->
          <div class="field">
            <label for="start-date-input" data-i18n="goalStartDate">Data de Início</label>
            <input id="start-date-input" type="text" required>
          </div>

          <!-- End date -->
          <div class="field">
            <label for="end-date-input" data-i18n="goalEndDate">Data de Término</label>
            <input id="end-date-input" type="text" required>
          </div>

          <!-- Description -->
          <div class="field" style="grid-column: 1 / -1">
            <label for="description-input" data-i18n="goalDescription" data-optional-label>Descrição</label>
            <textarea id="description-input" rows="2"
                      data-i18n-placeholder="goalDescriptionPlaceholder"
                      placeholder="Detalhes sobre a meta..."></textarea>
          </div>

          <!-- Categories multi-select -->
          <div class="field" style="grid-column: 1 / -1">
            <label data-i18n="goalCategories">Categorias (opcional)</label>
            <div id="categories-multi" class="multi-check-list"></div>
          </div>

          <!-- Locales multi-select -->
          <div class="field" style="grid-column: 1 / -1">
            <label data-i18n="goalLocales">Locais (opcional)</label>
            <div id="locales-multi" class="multi-check-list"></div>
          </div>

          <!-- Notifications -->
          <div class="field" style="grid-column: 1 / -1">
            <label data-i18n="goalNotifications">Notificações por E-mail</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" id="notify-50" checked>
                <span data-i18n="goalNotifyAt50">Ao atingir 50% do valor</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="notify-75" checked>
                <span data-i18n="goalNotifyAt75">Ao atingir 75% do valor</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="notify-90" checked>
                <span data-i18n="goalNotifyAt90">Ao atingir 90% do valor</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="notify-complete" checked>
                <span data-i18n="goalNotifyOnComplete">Ao concluir a meta</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="notify-deadline" checked>
                <span data-i18n="goalNotifyOnDeadline">7 dias antes do prazo</span>
              </label>
              <label class="checkbox-label" id="notify-exceed-row">
                <input type="checkbox" id="notify-exceed" checked>
                <span data-i18n="goalNotifyOnExceed">Ao ultrapassar o limite (apenas gasto máximo)</span>
              </label>
            </div>
          </div>

        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" id="cancel-btn" type="button" data-i18n="cancel">Cancelar</button>
          <button class="btn btn-primary"   id="save-btn"   type="button" data-i18n="saveGoal">Salvar Meta</button>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
