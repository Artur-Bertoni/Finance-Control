<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';</script>
  <title>Criar Conta | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link rel="preload" href="../styles/fonts/phosphor/Phosphor.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../styles/fonts/phosphor/style.css">
  <link href="../styles/styles.css" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/flag-icons/css/flag-icons.min.css">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="../js/Register.js" type="module"></script>
</head>
<body>
<div class="login-top-controls">
  <div class="login-lang-switcher">
    <button class="login-lang-trigger" id="lang-trigger" type="button" aria-label="Idioma"></button>
    <div class="login-lang-menu" id="lang-menu">
      <button class="login-lang-option" data-lang="pt" type="button"><span class="fi fi-squared fi-br"></span>Português</button>
      <button class="login-lang-option" data-lang="en" type="button"><span class="fi fi-squared fi-us"></span>English</button>
      <button class="login-lang-option" data-lang="es" type="button"><span class="fi fi-squared fi-es"></span>Español</button>
    </div>
  </div>
  <button class="theme-toggle-floating" id="theme-toggle-btn" type="button" aria-label="Alternar tema"></button>
</div>
<div class="login-page">
  <div class="login-logo">
    <img src="../images/logo.png" alt="Finance Control">
    <div class="login-logo-text">Finance<span>Control</span></div>
  </div>
  <div class="login-card">

    <p class="login-welcome" data-i18n="createAccount">Criar Conta</p>
    <p class="login-sub" data-i18n="guestFormHeader">Preencha os dados para acessar o Finance Control</p>

    <div class="login-form">
      <div class="field">
        <label for="username-input" data-i18n="username">Nome de Usuário</label>
        <input id="username-input" type="text" data-i18n-placeholder="usernamePlaceholder" placeholder="Seu nome de usuário..." autocomplete="username" required>
      </div>
      <div class="field" style="margin-top:14px">
        <label for="email-input" data-i18n="emailAddress">Endereço de Email</label>
        <input id="email-input" type="email" data-mask="email" data-i18n-placeholder="emailPlaceholder" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="field" style="margin-top:14px">
        <label for="password-input" data-i18n="password">Senha</label>
        <div class="pw-wrap">
          <input id="password-input" type="password" data-i18n-placeholder="passwordPlaceholderNew" placeholder="Digite uma senha" autocomplete="new-password" required>
          <button class="pw-toggle" type="button" id="password-img" aria-label="Mostrar/ocultar senha"></button>
        </div>
        <ul class="pw-requirements" id="pw-requirements">
          <li class="pw-req" data-rule="length"><i class="ph ph-circle"></i><span data-i18n="pwReqLength">Mínimo de 12 caracteres</span></li>
          <li class="pw-req" data-rule="upper"><i class="ph ph-circle"></i><span data-i18n="pwReqUpper">1 letra maiúscula</span></li>
          <li class="pw-req" data-rule="lower"><i class="ph ph-circle"></i><span data-i18n="pwReqLower">1 letra minúscula</span></li>
          <li class="pw-req" data-rule="digit"><i class="ph ph-circle"></i><span data-i18n="pwReqDigit">1 número</span></li>
          <li class="pw-req" data-rule="special"><i class="ph ph-circle"></i><span data-i18n="pwReqSpecial">1 caractere especial</span></li>
        </ul>
      </div>
      <div class="field" style="margin-top:14px">
        <label for="password-confirm-input" data-i18n="confirmPassword">Confirmar Senha</label>
        <div class="pw-wrap">
          <input id="password-confirm-input" type="password" data-i18n-placeholder="confirmPasswordPlaceholder" placeholder="Repita a senha" autocomplete="new-password" required>
          <button class="pw-toggle" type="button" id="password-confirm-img" aria-label="Mostrar/ocultar confirmação de senha"></button>
        </div>
      </div>

    </div>

    <div class="login-actions" style="margin-top:20px">
      <button class="btn btn-secondary btn-lg" id="back-btn" type="button" data-i18n="backToLogin">Voltar ao Login</button>
      <button class="btn btn-primary btn-lg" id="register-btn" type="button" data-i18n="createAccount">Criar Conta</button>
    </div>

  </div>
</div>
</body>
</html>
