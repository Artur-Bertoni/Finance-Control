        Meu Perfil
      </a>
    </div>
  </aside>

  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
      </button>
      <h1 class="page-title">Transferência entre Contas</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>

    <main class="page-content">
      <div class="form-card">
        <div class="form-grid">
          <div class="form-grid two-col">
            <div class="field">
              <label for="origin-account-input">Conta de Origem *</label>
              <div class="select-with-add">
                <select id="origin-account-input">
                  <option disabled selected value="">Selecione a origem</option>
                </select>
                <button type="button" class="btn-add-inline" id="origin-account-add-btn" title="Nova conta">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"/></svg>
                </button>
              </div>
            </div>
            <div class="field">
              <label for="destination-account-input">Conta de Destino *</label>
              <div class="select-with-add">
                <select id="destination-account-input">
                  <option disabled selected value="">Selecione o destino</option>
                </select>
                <button type="button" class="btn-add-inline" id="dest-account-add-btn" title="Nova conta">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"/></svg>
                </button>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="category-input">Categoria *</label>
            <div class="select-with-add">
              <select id="category-input">
                <option disabled selected value="">Selecione a categoria</option>
              </select>
              <button type="button" class="btn-add-inline" id="category-add-btn" title="Nova categoria">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"/></svg>
              </button>
            </div>
          </div>

          <div class="form-grid two-col">
            <div class="field">
              <label for="value-input">Valor ($) *</label>
              <input id="value-input" type="number" step=".01" min="0" placeholder="0,00">
            </div>
            <div class="field">
              <label for="date-input">Data *</label>
              <input id="date-input" type="date">
            </div>
          </div>

          <div class="field">
            <label for="transfer-locale-input">Local da Transferência</label>
            <div class="select-with-add">
              <select id="transfer-locale-input">
                <option disabled selected value="">Selecione o local (opcional)</option>
              </select>
              <button type="button" class="btn-add-inline" id="locale-add-btn" title="Novo local">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"/></svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="obs-input">Observações</label>
            <textarea id="obs-input" placeholder="Detalhes adicionais sobre a transferência…"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-secondary" id="cancel-btn" type="button">Cancelar</button>
          <button class="btn btn-primary"   id="save-btn"   type="button">Confirmar Transferência</button>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
})();
</script>
