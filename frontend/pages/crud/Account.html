<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Conta | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../../js/crud/Account.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="newAccount">Nova Conta</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>

    <main class="page-content">
      <div class="form-card">
        <div class="form-grid">
          <div class="field">
            <label for="name-input" data-i18n="accountName">Nome / Apelido</label>
            <input id="name-input" type="text" data-i18n-placeholder="accountNamePlaceholder" placeholder="Ex: Nubank, Carteira, C6..." required>
          </div>
          <div class="field">
            <label for="financial-institution-input" data-i18n="financialInstitution">Instituição Financeira</label>
            <div class="select-with-add">
              <select id="financial-institution-input" required>
                <option disabled selected value="" data-i18n="selectInstitution">Selecione a instituiÃ§Ã£o</option>
              </select>
              <button type="button" class="btn-add-inline" id="fi-add-btn" data-i18n-title="quickAdd" data-i18n-title-param="financialInstitution" title="Adição Rápida de Instituição Financeira" data-icon="add"></button>
            </div>
          </div>
          <div class="field">
            <label for="contact-input" data-i18n="contact" data-optional-label>Contato</label>
            <input id="contact-input" type="text" data-i18n-placeholder="contactPlaceholder" placeholder="Telefone ou e-mail de contato...">
          </div>
          <div class="field">
            <label for="description-input" data-i18n="description" data-optional-label>Descrição</label>
            <textarea id="description-input" data-i18n-placeholder="descriptionPlaceholder" placeholder="Detalhes sobre a conta..."></textarea>
          </div>
          <div class="field">
            <label for="type-input" data-i18n="accountType">Tipo de Conta</label>
            <select id="type-input">
              <option value="CHECKING" data-i18n="accountTypeChecking">Conta corrente / carteira</option>
              <option value="CREDIT_CARD" data-i18n="accountTypeCreditCard">Cartão de crédito</option>
            </select>
          </div>
          <div class="form-grid two-col" id="credit-card-fields" style="display:none">
            <div class="field">
              <label for="closing-day-input" data-i18n="closingDay">Dia de Fechamento</label>
              <input id="closing-day-input" type="number" min="1" max="31" placeholder="1-31">
            </div>
            <div class="field">
              <label for="due-day-input" data-i18n="dueDay">Dia de Vencimento</label>
              <input id="due-day-input" type="number" min="1" max="31" placeholder="1-31">
            </div>
          </div>
          <div class="field">
            <label for="balance-input" data-i18n="currentBalance">Saldo Atual ($)</label>
            <input id="balance-input" type="text" inputmode="decimal" data-mask="money" data-i18n-placeholder="currentBalancePlaceholder" placeholder="0,00" required>
          </div>
          <div class="field" style="grid-column: 1 / -1">
            <label for="icon-picker-trigger" data-i18n="categoryIcon" data-optional-label>Ícone</label>
            <button type="button" class="icon-picker-trigger" id="icon-picker-trigger" aria-haspopup="true" aria-expanded="false" aria-controls="icon-picker-dropdown">
              <span class="icon-picker-preview" id="icon-picker-preview">
                <i class="ph ph-bank" style="font-size:20px"></i>
              </span>
              <span class="icon-picker-label" id="icon-picker-label" data-i18n="iconPickerChoose">Escolher ícone...</span>
              <input type="hidden" id="icon-key-input">
            </button>
            <dialog class="icon-picker-dropdown" id="icon-picker-dropdown">
              <input type="text" class="icon-picker-search" id="icon-picker-search" data-i18n-placeholder="searchPlaceholder" placeholder="Digite para buscar..." autocomplete="off">
              <div class="icon-picker-grid" id="icon-picker-grid"></div>
            </dialog>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" id="cancel-btn" type="button" data-i18n="commonCancel">Cancelar</button>
          <button class="btn btn-primary"   id="save-btn"   type="button" data-i18n="saveAccount">Salvar Conta</button>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
