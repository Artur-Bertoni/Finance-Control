<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Transferência | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/flatpickr.min.css">
  <link href="../../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="/vendor/flatpickr.min.js"></script>
  <script src="/vendor/flatpickr-l10n-pt.js"></script>
  <script src="../../js/crud/Transfer.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" data-i18n="transferBetweenAccounts">Transferência entre Contas</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>

    <main class="page-content">
      <div class="form-card">
        <div class="form-grid">
          <div class="form-grid two-col">
            <div class="field">
              <label for="origin-account-input" data-i18n="sourceAccount">Conta de Origem</label>
              <div class="select-with-add">
                <select id="origin-account-input" required>
                  <option disabled selected value="" data-i18n="selectOrigin">Selecione a origem</option>
                </select>
                <button type="button" class="btn-add-inline" id="origin-account-add-btn" data-i18n-title="quickAdd" data-i18n-title-param="account" title="Adição Rápida de Conta" data-icon="add"></button>
              </div>
            </div>
            <div class="field">
              <label for="destination-account-input" data-i18n="destinationAccount">Conta de Destino</label>
              <div class="select-with-add">
                <select id="destination-account-input" required>
                  <option disabled selected value="" data-i18n="selectDestination">Selecione o destino</option>
                </select>
                <button type="button" class="btn-add-inline" id="dest-account-add-btn" data-i18n-title="quickAdd" data-i18n-title-param="account" title="Adição Rápida de Conta" data-icon="add"></button>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="category-input" data-i18n="transactionCategory">Categoria</label>
            <div class="select-with-add">
              <select id="category-input" required>
                <option disabled selected value="" data-i18n="selectCategory">Selecione a categoria</option>
              </select>
              <button type="button" class="btn-add-inline" id="category-add-btn" data-i18n-title="quickAdd" data-i18n-title-param="category" title="Adição Rápida de Categoria" data-icon="add"></button>
            </div>
          </div>

          <div class="form-grid two-col">
            <div class="field">
              <label for="value-input" data-i18n="transactionValue">Valor ($)</label>
              <input id="value-input" type="text" inputmode="decimal" data-mask="money" data-i18n-placeholder="valueZero" placeholder="0,00" required>
            </div>
            <div class="field">
              <label for="date-input" data-i18n="transactionDate">Data</label>
              <input id="date-input" type="date" required>
            </div>
          </div>

          <div class="field">
            <label for="transfer-locale-input" data-i18n="transactionLocale" data-optional-label>Local da Transferência</label>
            <div class="select-with-add">
              <select id="transfer-locale-input">
                <option disabled selected value="" data-i18n="selectLocale">Selecione o local...</option>
              </select>
              <button type="button" class="btn-add-inline" id="locale-add-btn" data-i18n-title="quickAdd" data-i18n-title-param="location" title="Adição Rápida de Local" data-icon="add"></button>
            </div>
          </div>

          <div class="field">
            <label for="obs-input" data-i18n="observations" data-optional-label>Observações</label>
            <textarea id="obs-input" data-i18n-placeholder="transferDescription" placeholder="Detalhes adicionais sobre a transferência…"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-secondary" id="cancel-btn" type="button" data-i18n="commonCancel">Cancelar</button>
          <button class="btn btn-primary"   id="save-btn"   type="button" data-i18n="confirmTransfer">Confirmar Transferência</button>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
