<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Local | Finance Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../js/TransactionLocaleView.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="locations">Locais</h1>
      <div class="topbar-actions" id="header-actions">
        <button class="btn btn-primary btn-sm" id="edit-btn" type="button" data-i18n="edit">Editar</button>
      </div>
    </header>

    <main class="page-content">
      <div class="detail-card">
        <div class="detail-grid">
          <div class="detail-field">
            <label for="detail-name" data-i18n="localeName">Nome</label>
            <p id="detail-name">—</p>
          </div>
          <div class="detail-field" id="icon-row" style="display:none">
            <span class="detail-label" data-i18n="categoryIcon">Ícone</span>
            <div id="detail-icon" style="display:flex;align-items:center;gap:8px;font-size:22px;color:var(--primary)"></div>
          </div>
          <div class="detail-field">
            <label for="detail-address" data-i18n="localeAddress">Endereço</label>
            <p id="detail-address">—</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
