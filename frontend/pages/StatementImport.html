<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>var _t=localStorage.getItem('theme');if(_t==='dark')document.documentElement.dataset.theme='dark';if(!globalThis.__appRouter){sessionStorage.setItem('__spa_url',location.pathname+location.search);location.replace('/pages/AppShell.html')}</script>
  <title>Importar Extrato | Finance Control</title>
  <link href="/styles/fonts/inter/inter.css" rel="stylesheet">
  <link href="../styles/styles.css" rel="stylesheet">
  <script src="/vendor/jquery-3.6.0.min.js"></script>
  <script src="../js/StatementImport.js" type="module"></script>
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <div class="main-container">
    <header class="topbar">
      <button class="btn btn-ghost sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Menu"></button>
      <h1 class="page-title" id="page-title-text" data-i18n="statementImport">Importar Extrato</h1>
      <div class="topbar-actions" id="header-actions"></div>
    </header>

    <main class="page-content">

      <div id="upload-section">
        <div class="form-card">
          <div class="form-grid">

            <div class="field">
              <label for="account-input" data-i18n="transactionAccount">Conta</label>
              <div class="select-with-add">
                <select id="account-input" required>
                  <option disabled selected value="" data-i18n="selectAccount">Selecione a conta</option>
                </select>
                <button type="button" class="btn-add-inline" id="account-add-btn" data-i18n-title="quickAdd" data-i18n-title-param="account" title="Adição Rápida de Conta" data-icon="add"></button>
              </div>
            </div>
            
            <div class="field">
              <div style="display:flex;align-items:center;gap:6px">
                <label for="file-input" data-i18n="importFile">Arquivo do extrato (PDF, OFX ou CNAB240)</label>
                <button type="button" class="info-hint-btn" id="import-info-btn" data-i18n-title="statementImportHint">
                    <i class="ph ph-info" aria-hidden="true"></i>
                  </button>
              </div>
              <div class="file-drop-zone" id="file-drop-zone">
                <span data-icon="upload"></span>
                <span class="file-drop-text" id="file-drop-text" data-i18n="dragDropFile">Arraste e solte o arquivo aqui, ou clique para selecionar</span>
                <input type="file" id="file-input" accept=".pdf,.ofx,.cnab,.ret,.rem,.txt" style="display:none" required>
              </div>
            </div>

          </div>

          <div class="form-actions">
            <button class="btn btn-secondary" id="cancel-btn" type="button" data-i18n="commonCancel">Cancelar</button>
            <button class="btn btn-primary" id="analyze-btn" type="button" data-i18n="analyzeStatement">Analisar Extrato</button>
          </div>
        </div>
      </div>

      <div id="review-section" style="display:none">
        <div class="form-card wide">
          <p style="font-size:14px;color:var(--text-muted);margin-bottom:12px" id="review-hint" data-i18n="reviewHint">
            Revise as transações abaixo, selecione a categoria de cada uma e clique em Importar.
          </p>
          <div class="review-table-wrapper">
            <table style="width:100%;border-collapse:collapse;font-size:14px" id="review-table">
              <thead>
                <tr style="border-bottom:1px solid var(--border)">
                  <th style="padding:8px 6px;white-space:nowrap;text-align:center">
                    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
                      <span data-i18n="shouldImport" style="font-size:12px;font-weight:600">Deve Importar</span>
                      <label class="checkbox-label" style="margin:0">
                        <input type="checkbox" id="select-all-check" checked aria-label="Selecionar todos">
                      </label>
                    </div>
                  </th>
                  <th style="padding:8px 6px;white-space:nowrap" data-i18n="transactionDate">Data</th>
                  <th style="padding:8px 6px" data-i18n="transactionDescription">Descrição</th>
                  <th style="padding:8px 6px;white-space:nowrap" data-i18n="transactionValue">Valor</th>
                  <th style="padding:8px 6px" data-i18n="transactionType">Tipo</th>
                  <th style="padding:8px 6px;min-width:220px"><span data-i18n="transactionCategory">Categoria</span><span class="required-mark"> *</span></th>
                  <th style="padding:8px 6px;min-width:180px"><span data-i18n="transactionLocale">Local</span><span class="optional-label"> (opcional)</span></th>
                </tr>
              </thead>
              <tbody id="review-tbody"></tbody>
            </table>
          </div>
          <div class="form-actions" style="margin-top:16px">
            <button class="btn btn-secondary" id="review-cancel-btn" type="button" data-i18n="commonCancel">Cancelar</button>
            <button class="btn btn-primary" id="confirm-btn" type="button" data-i18n="importSelected">Importar Selecionadas</button>
          </div>
        </div>
      </div>

      <div class="form-card import-result-card" id="import-result" style="display:none;margin-top:16px">
        <p id="import-result-text"></p>
      </div>

    </main>
  </div>
</div>
</body>
</html>
