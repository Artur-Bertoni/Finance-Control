spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:finance-control}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:test}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.jackson.serialization.write-dates-as-timestamps=false

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/db.changelog-master.xml
logging.level.liquibase.executor=DEBUG

server.port=${PORT:${SERVER_PORT:8081}}
server.forward-headers-strategy=framework

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.mail.from=${MAIL_FROM:noreply.financecontrol@gmail.com}

# ── JWT ──────────────────────────────────────────────────────────────────────
# Gere um secret seguro com: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET:TROQUE-POR-UMA-CHAVE-SECRETA-DE-64-CHARS-OU-MAIS-EM-PRODUCAO!!!!!}
app.jwt.expiration-days=${JWT_EXPIRATION_DAYS:7}

# ── OAuth2 Social Login ───────────────────────────────────────────────────────
# Google: https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

