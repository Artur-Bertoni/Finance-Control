spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:finance-control}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:test}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── Pool de conexões (HikariCP) ───────────────────────────────────────────────
# Dimensionado para instâncias pequenas/MySQL com poucas conexões disponíveis.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000

# ── Compressão de respostas (gzip) ────────────────────────────────────────────
# No Railway o próprio Spring serve front + API, e a borda do Railway NÃO comprime,
# então isto é o que reduz CSS/JS/JSON/locales no primeiro carregamento.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain,text/css,application/javascript,image/svg+xml
server.compression.min-response-size=1024

# ── Cache de assets estáticos (front servido a partir de resources/static) ─────
# Os arquivos não têm hash no nome; max-age curto evita servir versão velha após deploy.
# (revalidação por Last-Modified continua devolvendo 304 quando nada mudou)
spring.web.resources.cache.cachecontrol.max-age=1h
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.cache=true

# ── Actuator: expõe apenas health (usado para healthcheck do deploy) ───────────
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

spring.jackson.serialization.write-dates-as-timestamps=false

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/db.changelog-master.xml
logging.level.liquibase.executor=DEBUG

server.port=${PORT:${SERVER_PORT:8081}}
server.forward-headers-strategy=framework

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.mail.from=${MAIL_FROM:noreply.financecontrol@gmail.com}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-days=${JWT_EXPIRATION_DAYS:7}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

