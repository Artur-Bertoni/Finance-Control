<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#F3F6F3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F3F6F3;padding:40px 16px;">
    <tr>
      <td align="center">

        <table width="560" cellpadding="0" cellspacing="0"
               style="background-color:#FFFFFF;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background-color:#1A2B1B;padding:24px 40px;text-align:center;">
              <table cellpadding="0" cellspacing="0" style="margin:0 auto 10px;">
                <tr>
                  <td style="padding-right:10px;vertical-align:middle;">
                    <img src="cid:emailLogo" alt="Finance Control" width="40" height="40"
                         style="display:block;border-radius:8px;">
                  </td>
                  <td style="vertical-align:middle;">
                    <span style="font-size:24px;font-weight:800;color:#F0F0F0;letter-spacing:-0.5px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,sans-serif;line-height:1;">Finance<span style="color:#4CAF50;">Control</span></span>
                  </td>
                </tr>
              </table>
              <p style="margin:8px 0 0;font-size:13px;color:#A5D6A7;letter-spacing:0.5px;">📬 Novo Feedback Recebido</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 40px 28px;">

              <!-- Remetente -->
              <table width="100%" cellpadding="0" cellspacing="0"
                     style="background-color:#F9FAFB;border-radius:10px;padding:16px 20px;margin-bottom:24px;">
                <tr>
                  <td>
                    <p style="margin:0 0 4px;font-size:13px;color:#6B7280;">Enviado por</p>
                    <p style="margin:0;font-size:15px;font-weight:600;color:#1A2B1B;">{{senderName}}</p>
                    <p style="margin:2px 0 0;font-size:13px;color:#6B7280;">{{senderEmail}}</p>
                  </td>
                </tr>
              </table>

              <!-- Tipo e NPS -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
                <tr>
                  <td width="50%" style="padding-right:8px;">
                    <table width="100%" cellpadding="0" cellspacing="0"
                           style="background-color:#EFF6FF;border-radius:10px;padding:14px 16px;">
                      <tr>
                        <td>
                          <p style="margin:0 0 4px;font-size:12px;color:#3B82F6;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Tipo</p>
                          <p style="margin:0;font-size:14px;font-weight:600;color:#1E40AF;">{{feedbackType}}</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td width="50%" style="padding-left:8px;">
                    <table width="100%" cellpadding="0" cellspacing="0"
                           style="background-color:#F0FDF4;border-radius:10px;padding:14px 16px;">
                      <tr>
                        <td>
                          <p style="margin:0 0 4px;font-size:12px;color:#16A34A;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">NPS</p>
                          <p style="margin:0;font-size:14px;font-weight:600;color:#15803D;">{{npsScore}}</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- Mensagem -->
              <p style="margin:0 0 8px;font-size:13px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:0.5px;">Mensagem</p>
              <div style="background-color:#F9FAFB;border-left:4px solid #4CAF50;border-radius:0 8px 8px 0;padding:16px 20px;margin-bottom:28px;">
                <p style="margin:0;font-size:15px;line-height:1.7;color:#374151;white-space:pre-wrap;">{{feedbackMessage}}</p>
              </div>

              <!-- CTA -->
              <table cellpadding="0" cellspacing="0" style="margin:0 auto;">
                <tr>
                  <td style="background-color:#2E7D32;border-radius:8px;padding:12px 28px;text-align:center;">
                    <a href="{{baseUrl}}/pages/admin/FeedbackAdmin.html"
                       style="font-size:14px;font-weight:600;color:#FFFFFF;text-decoration:none;display:block;">
                      Ver todos os feedbacks →
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#F9FAFB;padding:16px 40px;text-align:center;border-top:1px solid #E5E7EB;">
              <a href="{{baseUrl}}" style="font-size:13px;color:#6B7280;text-decoration:none;">FinanceControl</a>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
